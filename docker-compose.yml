services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schemefinder
      POSTGRES_PASSWORD: schemefinder
      POSTGRES_DB: schemefinder
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemefinder"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://schemefinder:schemefinder@db:5432/schemefinder
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
