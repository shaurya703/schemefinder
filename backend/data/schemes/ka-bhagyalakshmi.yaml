id: ka-bhagyalakshmi
name: "Bhagyalakshmi (Karnataka Girl Child)"
category: women_child
level: state
state: karnataka
ministry: "Government of Karnataka — Department of Women and Child Development"
description: >
  Financial security for girl children born into BPL families in
  Karnataka: the state deposits Rs 3,000 a year for 15 years into a
  Sukanya Samriddhi account in the girl's name, maturing to about
  Rs 1.27 lakh when she turns 18 — conditional on schooling and not
  marrying before 18. Covers up to two girls per family.
benefits:
  - type: financial
    summary: "₹3,000/year deposited for 15 years, maturing to ~₹1.27 lakh at age 18"
    amount_max: null
eligibility:
  rules:
    - field: state
      op: eq
      value: karnataka
    - field: gender
      op: eq
      value: female
    - field: age
      op: lte
      value: 1
      label: "Girl child enrolled within one year of birth (answer the questionnaire for the child)"
    - field: is_bpl
      op: eq
      value: true
  self_check:
    - "At most two girls per family; birth registered and enrolment done within a year"
required_documents:
  - "Birth certificate"
  - "BPL card"
  - "Parents' Aadhaar"
  - "Bank account in girl's name"
application_url: "https://dwcd.karnataka.gov.in/"
source_urls:
  - "https://dwcd.karnataka.gov.in/"
last_verified: "2026-06-11"
tags: [karnataka, girl_child, bpl, women]
