id: post-matric-obc
name: "Post-Matric Scholarship for OBC Students (PM-YASASVI umbrella)"
category: scholarship
level: central
state: null
ministry: "Ministry of Social Justice and Empowerment"
description: >
  Scholarship for OBC (and EBC/DNT) students studying after class 10,
  now run under the PM-YASASVI umbrella. Covers an academic allowance
  and fee support for courses from class 11 to postgraduate level,
  subject to the family income ceiling.
benefits:
  - type: financial
    summary: "Academic allowance and fee support for post-matric courses"
    amount_max: 20000
eligibility:
  rules:
    - field: category
      op: eq
      value: obc
    - field: is_student
      op: eq
      value: true
    - field: education_level
      op: in
      value: [higher_secondary, diploma_iti, undergraduate, postgraduate, doctorate]
      label: "Studying after class 10"
    - field: annual_income
      op: lte
      value: 250000
  self_check:
    - "Enrolled in a recognised institution as a regular student"
required_documents:
  - "OBC certificate"
  - "Income certificate"
  - "Admission proof"
  - "Aadhaar-seeded bank account"
application_url: "https://scholarships.gov.in/"
source_urls:
  - "https://scholarships.gov.in/"
  - "https://socialjustice.gov.in/"
last_verified: "2026-06-11"
tags: [student, obc, scholarship]
