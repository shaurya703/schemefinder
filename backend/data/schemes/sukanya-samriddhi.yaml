id: sukanya-samriddhi
name: "Sukanya Samriddhi Yojana (Girl Child Savings)"
category: women_child
level: central
state: null
ministry: "Ministry of Finance"
description: >
  A high-interest, tax-free savings account for a girl child, opened by
  a parent or guardian before she turns 10. Deposits of Rs 250 to
  Rs 1.5 lakh per year earn one of the highest small-savings interest
  rates (8.2% in 2026), with full exemption under Section 80C. The
  account matures 21 years after opening.
benefits:
  - type: financial
    summary: "8.2% tax-free interest on deposits up to ₹1.5 lakh/year, maturing 21 years after opening"
    amount_max: null
eligibility:
  rules:
    - field: gender
      op: eq
      value: female
    - field: age
      op: lte
      value: 9
      label: "Girl child below 10 years (answer the questionnaire for the child)"
  self_check:
    - "Account is opened by a parent or legal guardian; at most two girls per family (exception for twins)"
required_documents:
  - "Girl child's birth certificate"
  - "Parent/guardian identity and address proof"
application_url: "https://www.nsiindia.gov.in/"
source_urls:
  - "https://www.nsiindia.gov.in/"
  - "https://www.indiapost.gov.in/"
last_verified: "2026-06-11"
tags: [girl_child, savings, women]
