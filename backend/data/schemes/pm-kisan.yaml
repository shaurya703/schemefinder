id: pm-kisan
name: "PM-KISAN (Pradhan Mantri Kisan Samman Nidhi)"
category: agriculture
level: central
state: null
ministry: "Ministry of Agriculture and Farmers Welfare"
description: >
  Income support for landholding farmer families: Rs 6,000 per year paid
  directly into the bank account in three equal instalments of Rs 2,000.
  Covers all landholding farmer families, subject to exclusions such as
  income-tax payers and government employees.
benefits:
  - type: financial
    summary: "₹6,000 per year in three instalments of ₹2,000, paid directly to your bank account"
    amount_max: 6000
eligibility:
  rules:
    - field: is_farmer
      op: eq
      value: true
  self_check:
    - "Your family (husband, wife and minor children) owns cultivable land recorded in their name"
    - "No family member pays income tax, is a serving or retired government employee, or holds a constitutional post"
    - "No family member is a practising professional (doctor, engineer, lawyer, CA, architect) or a pensioner drawing ₹10,000+ per month"
required_documents:
  - "Aadhaar card"
  - "Land ownership records (khata/khatauni)"
  - "Bank account details (Aadhaar-seeded)"
application_url: "https://pmkisan.gov.in/"
source_urls:
  - "https://pmkisan.gov.in/"
  - "https://www.myscheme.gov.in/schemes/pm-kisan"
last_verified: "2026-06-11"
tags: [farmer, income_support, dbt]
