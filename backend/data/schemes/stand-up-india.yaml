id: stand-up-india
name: "Stand-Up India"
category: business
level: central
state: null
ministry: "Ministry of Finance"
description: >
  Bank loans between Rs 10 lakh and Rs 1 crore for setting up a brand-new
  (greenfield) enterprise in manufacturing, services, trading or allied
  agriculture. Every bank branch is expected to fund at least one SC/ST
  borrower and one woman borrower.
benefits:
  - type: credit
    summary: "Composite loan of ₹10 lakh to ₹1 crore for a first-time enterprise"
    amount_max: 10000000
eligibility:
  rules:
    - field: age
      op: gte
      value: 18
    - field: is_entrepreneur
      op: eq
      value: true
    - any_of:
        - field: category
          op: in
          value: [sc, st]
        - field: gender
          op: eq
          value: female
      label: "SC/ST entrepreneur, or a woman entrepreneur of any category"
  self_check:
    - "The enterprise is greenfield — your first venture in manufacturing, services, trading or allied agri"
    - "For non-individual enterprises, 51% of shares are held by an SC/ST or woman entrepreneur"
    - "You are not a defaulter to any bank or financial institution"
required_documents:
  - "Identity, address and category (caste) proof"
  - "Project report / business plan"
  - "Bank account details"
application_url: "https://www.standupmitra.in/"
source_urls:
  - "https://www.standupmitra.in/"
last_verified: "2026-06-11"
tags: [entrepreneur, women, sc_st, credit]
